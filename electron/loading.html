<!-- <BERAT CANKIR OZEL ANALIZ SISTEMI> -->
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uygulamayı Hazırlıyorum..Hoşgeldiniz Berat Cankır</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 100%);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .loading-container {
            text-align: center;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .spinner {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(139, 92, 246, 0.1);
            border-top: 4px solid #8b5cf6;
            border-radius: 50%;
            margin: 0 auto 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .timer {
            font-size: 14px;
            color: #64748b;
            font-family: 'Courier New', monospace;
        }

        .error-message {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 24px;
            margin-top: 30px;
            max-width: 600px;
        }

        .error-message.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-title {
            color: #ef4444;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .error-details {
            color: #cbd5e1;
            font-size: 14px;
            line-height: 1.6;
        }

        .retry-button {
            margin-top: 20px;
            padding: 12px 24px;
            background: #8b5cf6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .retry-button:hover {
            background: #7c3aed;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="spinner"></div>
        <h1>HOŞGELDİNİZ BERAT CANKIR</h1>
        <div class="status" id="status">Backend server'i başlatıyorum...</div>
        <div class="timer" id="timer">Uygulama başlayacak,30 saniye kadar bekleteceğim.</div>

        <div class="error-message" id="error">
            <div class="error-title">
                <span>❌</span>
                <span>Yükleme Hatası</span>
            </div>
            <div class="error-details" id="error-details">
                Server başlatılamadı. Lütfen uygulamayı yeniden başlat.
            </div>
            <button class="retry-button" onclick="location.reload()">Yeniden Dene</button>
        </div>
    </div>

    <script>
        let startTime = Date.now();
        let timerInterval;

        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const remaining = Math.max(0, 30 - elapsed);
            document.getElementById('timer').textContent = 
                `Lütfen bekleyin (${remaining} saniye)`;
            
            if (remaining === 0) {
                clearInterval(timerInterval);
            }
        }

        timerInterval = setInterval(updateTimer, 1000);

        // Error mesajını göster (Electron'dan çağrılacak)
        window.showError = function(message) {
            clearInterval(timerInterval);
            document.querySelector('.spinner').style.display = 'none';
            document.getElementById('status').style.display = 'none';
            document.getElementById('timer').style.display = 'none';
            document.getElementById('error-details').textContent = message;
            document.getElementById('error').classList.add('show');
        };
    </script>
</body>
</html>
